services:
  postgres:
    image: postgres:16-alpine
    container_name: omnicreator-postgres-dev
    environment:
      POSTGRES_USER: omnicreator
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: omnicreator
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnicreator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnicreator-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: omnicreator-api-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://omnicreator:password123@postgres:5432/omnicreator
      SESSION_SECRET: dev-secret-key-change-in-production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: pnpm --filter @workspace/api-server run dev
    networks:
      - omnicreator-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: omnicreator-web-dev
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages:/app/packages
    command: pnpm --filter @workspace/omnicreator run dev
    networks:
      - omnicreator-network

volumes:
  postgres_dev_data:
    driver: local

networks:
  omnicreator-network:
    driver: bridge