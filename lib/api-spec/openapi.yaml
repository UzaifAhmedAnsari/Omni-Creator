          type: integer
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        invoices:
          type: array
          items:
            type: object
    UsageLedger:
      type: object
      required: [orgId, totalCredits, entries]
      properties:
        orgId:
          type: string
        totalCredits:
          type: number
        entries:
          type: array
          items:
            type: object
    CreateCheckoutBody:
      type: object
      required: [planKey]
      properties:
        planKey:
          type: string
        seats:
          type: integer
    CheckoutResponse:
      type: object
      required: [url, setupRequired]
      properties:
