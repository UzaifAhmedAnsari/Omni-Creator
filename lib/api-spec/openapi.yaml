          type: string

    # SOCIAL ACCOUNTS
    SocialAccount:
      type: object
      required: [id, workspaceId, platform, accountName, status, createdAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        platform:
          type: string
          enum: [youtube, tiktok, instagram, facebook, linkedin, twitter, pinterest]
        accountName:
          type: string
        accountId:
          type: string
        avatarUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, expired, revoked, error]
        scopes:
          type: array
          items:
            type: string
        tokenExpiresAt:
          type: ["string", "null"]
        createdAt:
          type: string

    # PUBLISHING JOBS
    PublishingJob:
      type: object
      required: [id, workspaceId, projectId, platform, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        projectId:
          type: string
        assetId:
          type: ["string", "null"]
        socialAccountId:
          type: ["string", "null"]
        platform:
          type: string
        status:
          type: string
          enum: [draft, preflight_pending, preflight_passed, preflight_failed, scheduled, publishing, published, failed, cancelled]
        scheduledAt:
          type: ["string", "null"]
        publishedAt:
          type: ["string", "null"]
        platformPostId:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    CreatePublishingJobBody:
      type: object
      required: [projectId, platform]
      properties:
        projectId:
          type: string
        assetId:
          type: string
        socialAccountId:
          type: string
        platform:
          type: string
        scheduledAt:
          type: string
        metadata:
          type: object

    # ANALYTICS
    WorkspaceAnalytics:
      type: object
      required: [workspaceId, period]
      properties:
        workspaceId:
          type: string
        period:
          type: object
        projectsCreated:
          type: integer
        assetsGenerated:
          type: integer
        publishingSuccessRate:
          type: number
        totalCreditsUsed:
          type: number
        topPlatforms:
          type: array
          items:
            type: object
        postPerformance:
          type: array
          items:
            type: object
    ProjectAnalytics:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
        views:
          type: ["integer", "null"]
        likes:
          type: ["integer", "null"]
        comments:
          type: ["integer", "null"]
        shares:
          type: ["integer", "null"]
        watchTime:
          type: ["number", "null"]
        publishedPosts:
          type: array
          items:
            type: object
    AnalyticsRecommendation:
      type: object
      required: [id, type, title, reason, impact]
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        reason:
          type: string
        impact:
          type: string
        action:
          type: ["string", "null"]

    # BILLING
    BillingInfo:
      type: object
      required: [orgId, plan, creditsBalance, creditsUsedThisPeriod, periodEnd]
      properties:
        orgId:
          type: string
        plan:
          type: string
        creditsBalance:
          type: number
        creditsUsedThisPeriod:
          type: number
        periodEnd:
          type: ["string", "null"]
        seats:
          type: integer
