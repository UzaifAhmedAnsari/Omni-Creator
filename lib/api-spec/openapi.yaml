components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # AUTH
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ORGANIZATIONS
    Organization:
      type: object
      required: [id, name, slug, plan, ownerId, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: ["string", "null"]
        plan:
          type: string
        ownerId:
          type: string
        creditsBalance:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateOrganizationBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
    UpdateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: ["string", "null"]

    # WORKSPACES
    Workspace:
      type: object
      required: [id, orgId, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        defaultBrandKitId:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateWorkspaceBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
    UpdateWorkspaceBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        defaultBrandKitId:
          type: ["string", "null"]

    # MEMBERS
    Member:
      type: object
      required: [id, userId, orgId, role, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        orgId:
          type: string
        role:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
    InviteMemberBody:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
        role:
          type: string
    UpdateMemberRoleBody:
      type: object
      required: [role]
      properties:
        role:
          type: string

    # BRAND KITS
    BrandKit:
      type: object
      required: [id, workspaceId, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        name:
          type: string
        colors:
          type: array
          items:
            type: string
        fonts:
          type: array
          items:
            type: string
        logoUrl:
          type: ["string", "null"]
        tone:
          type: ["string", "null"]
        audience:
          type: ["string", "null"]
        forbiddenTerms:
          type: array
          items:
            type: string
        styleNotes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateBrandKitBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
        colors:
          type: array
          items:
            type: string
        fonts:
          type: array
          items:
            type: string
        logoUrl:
          type: string
        tone:
          type: string
        audience:
          type: string
    UpdateBrandKitBody:
      type: object
      properties:
        name:
          type: string
        colors:
          type: array
          items:
            type: string
        fonts:
          type: array
          items:
            type: string
        logoUrl:
          type: ["string", "null"]
        tone:
          type: ["string", "null"]
        audience:
          type: ["string", "null"]
        forbiddenTerms:
          type: array
          items:
            type: string
        styleNotes:
          type: ["string", "null"]

    # PROJECTS
    Project:
      type: object
      required: [id, workspaceId, name, type, status, createdById, createdAt, updatedAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [video, image, carousel, ad, thumbnail, product_mockup, campaign, template, asset_only]
        status:
          type: string
          enum: [draft, in_progress, review, approved, published, archived]
        platform:
          type: ["string", "null"]
        aspectRatio:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        language:
          type: ["string", "null"]
        brandKitId:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        isArchived:
          type: boolean
        createdById:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateProjectBody:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        platform:
          type: string
        aspectRatio:
          type: string
        duration:
          type: number
        language:
          type: string
        brandKitId:
          type: string
        tags:
          type: array
          items:
            type: string
    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
        platform:
          type: ["string", "null"]
        aspectRatio:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        language:
          type: ["string", "null"]
        brandKitId:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string

    # VIDEO EDITOR
    TimelineDocument:
      type: object
      required: [id, projectId, version, durationMs, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        version:
          type: integer
        durationMs:
          type: number
        tracks:
          type: array
          items:
            type: object
        captions:
          type: array
          items:
            type: object
        audioMix:
          type: object
        exportSettings:
          type: object
        updatedAt:
          type: string
    SaveTimelineBody:
      type: object
      required: [tracks, durationMs]
      properties:
        durationMs:
          type: number
        tracks:
          type: array
          items:
            type: object
        captions:
          type: array
          items:
            type: object
        audioMix:
          type: object
        exportSettings:
          type: object

    # IMAGE EDITOR
    CanvasDocument:
      type: object
      required: [id, projectId, version, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        version:
          type: integer
        pages:
          type: array
          items:
            type: object
        sharedAssets:
          type: array
          items:
            type: string
        brandKitId:
          type: ["string", "null"]
        updatedAt:
          type: string
    SaveCanvasBody:
      type: object
      required: [pages]
      properties:
        pages:
          type: array
          items:
            type: object
        sharedAssets:
          type: array
          items:
            type: string
        brandKitId:
          type: ["string", "null"]

    # ASSETS
    Asset:
      type: object
      required: [id, workspaceId, name, type, url, source, aiGenerated, createdAt, updatedAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [image, video, audio, document, other]
        url:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["number", "null"]
        width:
          type: ["number", "null"]
        height:
          type: ["number", "null"]
        duration:
          type: ["number", "null"]
        source:
          type: string
          enum: [uploaded, generated, stock, licensed]
        aiGenerated:
          type: boolean
        providerKey:
          type: ["string", "null"]
        promptId:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        folder:
          type: ["string", "null"]
        isFavorite:
          type: boolean
        commercialUseAllowed:
          type: ["boolean", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    UpdateAssetBody:
      type: object
      properties:
        name:
          type: string
        tags:
          type: array
          items:
            type: string
        folder:
          type: ["string", "null"]
        isFavorite:
          type: boolean
    GetUploadUrlBody:
      type: object
      required: [fileName, mimeType, workspaceId]
      properties:
        fileName:
          type: string
        mimeType:
          type: string
        workspaceId:
          type: string
        folder:
          type: string
    UploadUrlResponse:
      type: object
      required: [uploadUrl, assetId, key]
      properties:
        uploadUrl:
          type: string
        assetId:
          type: string
        key:
          type: string

    # AI JOBS
    AiJob:
      type: object
      required: [id, workspaceId, taskType, status, creditsEstimated, createdAt, updatedAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        projectId:
          type: ["string", "null"]
        taskType:
          type: string
        status:
          type: string
          enum: [draft, queued, running, succeeded, failed, cancelled, blocked, setup_required]
        providerKey:
          type: ["string", "null"]
        modelKey:
          type: ["string", "null"]
        prompt:
          type: ["string", "null"]
        outputAssetIds:
          type: array
          items:
            type: string
        creditsEstimated:
          type: number
        creditsFinal:
          type: ["number", "null"]
        errorMessage:
          type: ["string", "null"]
        setupRequiredInfo:
          type: ["object", "null"]
        progressPercent:
          type: ["number", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateAiJobBody:
      type: object
      required: [taskType, prompt]
      properties:
        taskType:
          type: string
        prompt:
          type: string
        negativePrompt:
          type: string
        projectId:
          type: string
        providerKey:
          type: string
        modelKey:
          type: string
        referenceAssetIds:
          type: array
          items:
            type: string
        parameters:
          type: object
    GeneratePlanBody:
      type: object
      required: [brief]
      properties:
        brief:
          type: string
        platform:
          type: string
        tone:
          type: string
        audience:
          type: string
        duration:
          type: number
        brandKitId:
          type: string
    ProjectPlan:
      type: object
      required: [projectId, hooks, script, scenes, creditEstimate, updatedAt]
      properties:
        projectId:
          type: string
        hooks:
          type: array
          items:
            type: object
        script:
          type: ["object", "null"]
        scenes:
          type: array
          items:
            type: object
        layoutPlan:
          type: ["object", "null"]
        promptPack:
          type: array
          items:
            type: object
        creditEstimate:
          type: number
        safetyWarnings:
          type: array
          items:
            type: string
        updatedAt:
          type: string

    # TEMPLATES
    Template:
      type: object
      required: [id, name, type, category, thumbnailUrl, createdAt]
      properties:
        id:
          type: string
        workspaceId:
          type: ["string", "null"]
        name:
          type: string
        type:
          type: string
        category:
          type: string
        thumbnailUrl:
          type: string
        isSystem:
          type: boolean
        isBrandLocked:
          type: boolean
