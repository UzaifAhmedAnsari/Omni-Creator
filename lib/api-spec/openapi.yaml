openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: OmniCreator AI Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Authentication endpoints
  - name: Organizations
    description: Organization management
  - name: Workspaces
    description: Workspace management
  - name: Members
    description: Membership and roles
  - name: Projects
    description: Project management
  - name: Assets
    description: Asset library
  - name: BrandKits
    description: Brand kit management
  - name: Templates
    description: Template library
  - name: AIJobs
    description: AI generation jobs
  - name: VideoEditor
    description: Video editor state
  - name: ImageEditor
    description: Image editor state
  - name: Publishing
    description: Social publishing
  - name: SocialAccounts
    description: Connected social accounts
  - name: Analytics
    description: Analytics and recommendations
  - name: Billing
    description: Billing and usage
  - name: Providers
    description: AI provider configuration
  - name: Admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect on login completion.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  # ORGANIZATIONS
  /organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List user's organizations
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationBody'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'

  /organizations/{orgId}:
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get organization details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    patch:
      tags: [Organizations]
      operationId: updateOrganization
      summary: Update organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationBody'
      responses:
        '200':
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'

  # WORKSPACES
  /organizations/{orgId}/workspaces:
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      summary: List workspaces in an organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
    post:
      tags: [Workspaces]
      operationId: createWorkspace
      summary: Create a workspace
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceBody'
      responses:
        '201':
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'

  /workspaces/{workspaceId}:
    get:
      tags: [Workspaces]
      operationId: getWorkspace
      summary: Get workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
    patch:
      tags: [Workspaces]
      operationId: updateWorkspace
      summary: Update workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceBody'
      responses:
        '200':
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'

  # MEMBERS
  /organizations/{orgId}/members:
    get:
      tags: [Members]
      operationId: listOrgMembers
      summary: List organization members
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
    post:
      tags: [Members]
      operationId: inviteMember
      summary: Invite a member to organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberBody'
      responses:
        '201':
          description: Invited member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'

  /organizations/{orgId}/members/{memberId}:
    patch:
      tags: [Members]
      operationId: updateMemberRole
      summary: Update member role
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRoleBody'
      responses:
        '200':
          description: Updated member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
    delete:
      tags: [Members]
      operationId: removeMember
      summary: Remove member from organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # BRAND KITS
  /workspaces/{workspaceId}/brand-kits:
    get:
      tags: [BrandKits]
      operationId: listBrandKits
      summary: List brand kits in a workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of brand kits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BrandKit'
    post:
      tags: [BrandKits]
      operationId: createBrandKit
      summary: Create a brand kit
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrandKitBody'
      responses:
        '201':
          description: Created brand kit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandKit'

  /brand-kits/{brandKitId}:
    get:
      tags: [BrandKits]
      operationId: getBrandKit
      summary: Get brand kit
      parameters:
        - name: brandKitId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Brand kit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandKit'
    patch:
      tags: [BrandKits]
      operationId: updateBrandKit
      summary: Update brand kit
      parameters:
        - name: brandKitId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBrandKitBody'
      responses:
        '200':
          description: Updated brand kit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandKit'
    delete:
      tags: [BrandKits]
      operationId: deleteBrandKit
      summary: Delete brand kit
      parameters:
        - name: brandKitId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # PROJECTS
  /workspaces/{workspaceId}/projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects in a workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: archived
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a new project
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectBody'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{projectId}:
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get project details
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    patch:
      tags: [Projects]
      operationId: updateProject
      summary: Update project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectBody'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      tags: [Projects]
      operationId: deleteProject
      summary: Delete project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /projects/{projectId}/duplicate:
    post:
      tags: [Projects]
      operationId: duplicateProject
      summary: Duplicate a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Duplicated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{projectId}/archive:
    post:
      tags: [Projects]
      operationId: archiveProject
      summary: Archive a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{projectId}/restore:
    post:
      tags: [Projects]
      operationId: restoreProject
      summary: Restore an archived project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  # VIDEO EDITOR
  /projects/{projectId}/timeline:
    get:
      tags: [VideoEditor]
      operationId: getTimeline
      summary: Get video editor timeline state
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Timeline document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineDocument'
    put:
      tags: [VideoEditor]
      operationId: saveTimeline
      summary: Save video editor timeline state
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveTimelineBody'
      responses:
        '200':
          description: Saved timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineDocument'

  # IMAGE EDITOR
  /projects/{projectId}/canvas:
    get:
      tags: [ImageEditor]
      operationId: getCanvas
      summary: Get image editor canvas state
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Canvas document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanvasDocument'
    put:
      tags: [ImageEditor]
      operationId: saveCanvas
      summary: Save image editor canvas state
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCanvasBody'
      responses:
        '200':
          description: Saved canvas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanvasDocument'

  # ASSETS
  /workspaces/{workspaceId}/assets:
    get:
      tags: [Assets]
      operationId: listAssets
      summary: List assets in workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: folder
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tags
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Asset'

  /assets/{assetId}:
    get:
      tags: [Assets]
      operationId: getAsset
      summary: Get asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
    patch:
      tags: [Assets]
      operationId: updateAsset
      summary: Update asset metadata
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssetBody'
      responses:
        '200':
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
    delete:
      tags: [Assets]
      operationId: deleteAsset
      summary: Delete asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /assets/upload-url:
    post:
      tags: [Assets]
      operationId: getUploadUrl
      summary: Get a signed upload URL for an asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetUploadUrlBody'
      responses:
        '200':
          description: Upload URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'

  # AI JOBS
  /workspaces/{workspaceId}/ai-jobs:
    get:
      tags: [AIJobs]
      operationId: listAiJobs
      summary: List AI generation jobs
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: projectId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of AI jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiJob'
    post:
      tags: [AIJobs]
      operationId: createAiJob
      summary: Create an AI generation job
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAiJobBody'
      responses:
        '201':
          description: Created AI job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJob'

  /ai-jobs/{jobId}:
    get:
      tags: [AIJobs]
      operationId: getAiJob
      summary: Get AI job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AI job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJob'

  /ai-jobs/{jobId}/cancel:
    post:
      tags: [AIJobs]
      operationId: cancelAiJob
      summary: Cancel an AI job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJob'

  /ai-jobs/{jobId}/retry:
    post:
      tags: [AIJobs]
      operationId: retryAiJob
      summary: Retry a failed AI job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retried job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJob'

  /projects/{projectId}/generate-plan:
    post:
      tags: [AIJobs]
      operationId: generateProjectPlan
      summary: Generate AI plan for a project brief
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePlanBody'
      responses:
        '200':
          description: Generated plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPlan'

  /projects/{projectId}/plan:
    get:
      tags: [AIJobs]
      operationId: getProjectPlan
      summary: Get saved project plan
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPlan'
    put:
      tags: [AIJobs]
      operationId: saveProjectPlan
      summary: Save/update project plan
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPlan'
      responses:
        '200':
          description: Saved plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPlan'

  # TEMPLATES
  /workspaces/{workspaceId}/templates:
    get:
      tags: [Templates]
      operationId: listTemplates
      summary: List templates
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Template'

  /templates/{templateId}:
    get:
      tags: [Templates]
      operationId: getTemplate
      summary: Get template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'

  # SOCIAL ACCOUNTS
  /workspaces/{workspaceId}/social-accounts:
    get:
      tags: [SocialAccounts]
      operationId: listSocialAccounts
      summary: List connected social accounts
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Social accounts
          content:
            application/json:
              schema:
