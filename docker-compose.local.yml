services:
  postgres:
    image: postgres:16-alpine
    container_name: omnicreator-postgres-dev
    environment:
      POSTGRES_USER: omnicreator
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: omnicreator
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnicreator -d omnicreator"]
      interval: 10s
      timeout: 5s
      retries: 5

  deps:
    image: node:22-bookworm-slim
    working_dir: /app
    environment:
      CI: "true"
    volumes:
      - .:/app
      - pnpm_store:/pnpm/store
      - node_modules:/app/node_modules
    command: >
      sh -lc "
      corepack enable &&
      corepack prepare pnpm@11.0.9 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --no-frozen-lockfile
      "

  api:
    image: node:22-bookworm-slim
    container_name: omnicreator-api-dev
    working_dir: /app
    environment:
      CI: "true"
      NODE_ENV: development
      DATABASE_URL: postgresql://omnicreator:password123@postgres:5432/omnicreator
      SESSION_SECRET: dev-secret-key-change-in-production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - pnpm_store:/pnpm/store
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    command: >
      sh -lc "
      corepack enable &&
      corepack prepare pnpm@11.0.9 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --filter @workspace/api-server run dev
      "

  web:
    image: node:22-bookworm-slim
    container_name: omnicreator-web-dev
    working_dir: /app
    environment:
      CI: "true"
      PORT: 3000
      BASE_PATH: /
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - pnpm_store:/pnpm/store
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: >
      sh -lc "
      corepack enable &&
      corepack prepare pnpm@11.0.9 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --filter @workspace/omnicreator run dev
      "

volumes:
  postgres_dev_data:
  pnpm_store:
  node_modules: